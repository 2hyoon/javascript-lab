<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription</title>
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <link rel="stylesheet" href="styles/app.css" />
  </head>
  <body data-component="form">
    {{> hbs/header}}
    <div class="container">
      <main>
        <section>
          <h1 id="form-title">Create Your Account</h1>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Odio
            recusandae earum saepe suscipit et sit.
          </p>
          <div id="alert-container"></div>
          <form
            id="subscription-form"
            class="sform"
            novalidate
            aria-labelledby="form-title"
          >
            <div class="sform-container sform-input">
              <label for="name">Full Name</label>
              <input
                type="text"
                name="name"
                id="name"
                placeholder="John Doe"
                autocomplete="name"
                required
              />
              <p id="name-error" class="field-error" aria-live="polite"></p>
            </div>
            <div class="sform-container sform-input">
              <label for="email">Email Address</label>
              <input
                type="email"
                name="email"
                id="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
              <p id="email-error" class="field-error" aria-live="polite"></p>
            </div>
            <fieldset id="plan-options">
              <legend>Select a Plan</legend>
              <div>
                <input
                  type="radio"
                  name="plan"
                  id="plan-free"
                  value="free"
                  checked
                />
                <label for="plan-free">Free</label>
              </div>
              <div>
                <input type="radio" name="plan" id="plan-basic" value="basic" />
                <label for="plan-basic">Basic</label>
              </div>
              <div>
                <input
                  type="radio"
                  name="plan"
                  id="plan-premium"
                  value="premium"
                />
                <label for="plan-premium">Premium</label>
              </div>
            </fieldset>
            <div class="sform-container">
              <input
                type="checkbox"
                name="agreedToTerms"
                id="agreedToTerms"
                required
              />
              <label for="agreedToTerms"
                >I agree to the Terms and Conditions</label
              >
              <p id="terms-error" class="field-error" aria-live="polite"></p>
            </div>
            <button type="submit" id="submit-button">Subscribe Now</button>
          </form>
        </section>
      </main>
    </div>

    <script src="scripts/app.js"></script>
  </body>
</html>

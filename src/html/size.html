<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Size</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <style>
      body {
        margin: 0;
      }
      #container {
        position: relative; /* #child의 offsetParent가 됨 */
        margin-top: 50px;
        padding: 10px;
        border: 5px solid black;
        background-color: aquamarine;
      }
      #child {
        margin-top: 20px;
        margin-left: 30px;
        width: 50px;
        height: 50px;
        background-color: darkcyan;
      }
      p {
        max-width: 300px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="child"></div>
    </div>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Magni dolorum perspiciatis ratione delectus aliquid odit, quidem suscipit esse hic odio maiores, eos quis vel veritatis provident consequatur eligendi numquam placeat!</p>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="stylesheet" href="styles/app.css" />
  </head>
  <body data-component="counter">
    {{> hbs/header}}
    <div class="container">
      <section class="counter">
        <h1>Counter</h1>
        <p aria-live="polite" class="counter-num" id="count">0</p>
        <div class="counter-controller">
          <button
            aria-label="Decrement count"
            class="counter-btn"
            id="decrement-btn"
          >
            Decrease
          </button>
          <button aria-label="Reset count" class="counter-btn" id="reset-btn">
            Reset
          </button>
          <button
            aria-label="Increment count"
            class="counter-btn"
            id="increment-btn"
          >
            Increase
          </button>
        </div>
      </section>
    </div>
    <script src="scripts/app.js"></script>
  </body>
</html>
